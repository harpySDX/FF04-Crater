<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Plant 🌱</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  margin: 0;
  overflow: hidden;
  background: #ffd6ec;
  font-family: "Press Start 2P", monospace;
  image-rendering: pixelated;
}

/* ===== LAYOUT ===== */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* SCORE (simple text only) */
#score {
  position: absolute;
  top: 18px;
  left: 18px;
  font-size: 12px;
  color: #000;
}

/* ===== PLANT CENTER ===== */
#plant {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* BIG PIXEL TREE (fully visible now) */
#tree {
  width: 140px;
  height: 180px;
  margin: 0 auto;
  position: relative;
  transform-origin: bottom center;
}

/* trunk + leaves block */
#tree::before {
  content: "";
  position: absolute;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  width: 20px;
  height: 80px;
  background: #8b5a2b;
  box-shadow:
    -20px -25px 0 0 #7CFF8B,
     20px -25px 0 0 #7CFF8B,
      0px -50px 0 0 #7CFF8B,
    -40px 0px 0 0 #7CFF8B,
     40px 0px 0 0 #7CFF8B;
}

/* pot */
#pot {
  width: 90px;
  height: 40px;
  margin: 8px auto 0;
  background: #d9a066;
  border: 3px solid #000;
}

/* ===== WATER BAR (closer to center) ===== */
#barWrap {
  position: absolute;
  right: calc(50% - 240px); /* pulled toward center */
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 300px;
  border: 4px solid #000;
  background: #fff;
}

/* danger zones */
#barWrap::before,
#barWrap::after {
  content: "";
  position: absolute;
  left: 0;
  width: 100%;
  height: 20%;
  background: #ff4d4d;
}

#barWrap::before { top: 0; }
#barWrap::after { bottom: 0; }

/* fill */
#barFill {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: #3cc7ff;
  transition: height 0.08s linear;
}

/* pixel overlay */
#barGrid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(#000 1px, transparent 1px),
    linear-gradient(90deg, #000 1px, transparent 1px);
  background-size: 10px 10px;
  opacity: 0.12;
}

/* ===== BUTTON (bottom center) ===== */
#waterBtn {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-family: inherit;
  font-size: 10px;
  padding: 14px 18px;
  background: #fff;
  border: 3px solid #000;
  cursor: pointer;
}

#waterBtn:active {
  transform: translateX(-50%) scale(0.96);
}

/* ===== GAME OVER ===== */
#gameOver {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,0.7);
  color: #fff;
}

#restart {
  margin-top: 20px;
  padding: 10px;
  font-family: inherit;
  border: 3px solid #000;
}

/* ===== ANIMATIONS ===== */
@keyframes sway {
  0% { transform: translate(-50%, -50%) rotate(-2deg); }
  50% { transform: translate(-50%, -50%) rotate(2deg); }
  100% { transform: translate(-50%, -50%) rotate(-2deg); }
}

@keyframes panic {
  0% { transform: translate(-50%, -50%) rotate(-5deg); }
  50% { transform: translate(-50%, -50%) rotate(5deg); }
  100% { transform: translate(-50%, -50%) rotate(-5deg); }
}

.normal { animation: sway 2.5s infinite; }
.stressed { animation: panic 0.35s infinite; }
</style>
</head>

<body>

<div id="game">
  <div id="score">Score: 0</div>

  <div id="plant">
    <div id="tree" class="normal"></div>
    <div id="pot"></div>
  </div>

  <div id="barWrap">
    <div id="barFill"></div>
    <div id="barGrid"></div>
  </div>

  <button id="waterBtn">WATER (SPACE)</button>

  <div id="gameOver">
    <h1>💀 DEAD PLANT</h1>
    <div id="finalScore"></div>
    <button id="restart">RESTART</button>
  </div>
</div>

<script>
let water = 50;
let score = 0;
let alive = true;

const bar = document.getElementById("barFill");
const tree = document.getElementById("tree");
const scoreEl = document.getElementById("score");
const gameOver = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");

function update() {
  bar.style.height = water + "%";

  if (water <= 20 || water >= 80) {
    tree.classList.add("stressed");
    tree.classList.remove("normal");
  } else {
    tree.classList.add("normal");
    tree.classList.remove("stressed");
  }

  if (water <= 0 || water >= 100) {
    die();
  }
}

function waterPlant() {
  if (!alive) return;
  water += 10;
  if (water > 100) water = 100;
  update();
}

function die() {
  alive = false;
  gameOver.style.display = "flex";
  finalScore.innerText = "Score: " + score;
}

document.getElementById("waterBtn").onclick = waterPlant;

document.addEventListener("keydown", e => {
  if (e.code === "Space") waterPlant();
});

document.getElementById("restart").onclick = () => location.reload();

setInterval(() => {
  if (!alive) return;

  water -= 0.7 + Math.random() * 0.6;
  score++;

  scoreEl.innerText = "Score: " + score;
  update();
}, 120);

update();
</script>

</body>
</html>

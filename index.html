<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Plant Core 🌱</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  margin: 0;
  overflow: hidden;
  background: #ffd6ec; /* solid pastel, no gradient */
  font-family: "Press Start 2P", monospace;
  image-rendering: pixelated;
}

/* ===== GAME LAYOUT ===== */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* SCORE */
#score {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 12px;
  background: #fff;
  border: 4px solid #000;
  padding: 10px;
  box-shadow: 4px 4px 0 #000;
}

/* ===== CENTER PLANT ===== */
#plant {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* BIG PIXEL TREE */
#tree {
  width: 160px;
  height: 220px;
  margin: 0 auto;
  position: relative;
  transform-origin: bottom center;
}

/* pixel trunk */
#tree::before {
  content: "";
  position: absolute;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  width: 24px;
  height: 90px;
  background: #8b5a2b;
  box-shadow:
    -24px -30px 0 0 #7CFF8B,
     24px -30px 0 0 #7CFF8B,
      0px -60px 0 0 #7CFF8B,
    -48px 0px 0 0 #7CFF8B,
     48px 0px 0 0 #7CFF8B;
}

/* pot */
#pot {
  width: 120px;
  height: 50px;
  margin: 10px auto 0;
  background: #d9a066;
  border: 4px solid #000;
  box-shadow: 4px 4px 0 #000;
}

/* ===== WATER BAR (PIXEL ART SINGLE BAR) ===== */
#barWrap {
  position: absolute;
  right: 60px;
  top: 50%;
  transform: translateY(-50%);
  width: 60px;
  height: 340px;
  border: 5px solid #000;
  background: #fff;
  position: relative;
}

/* red danger zones */
#barWrap::before,
#barWrap::after {
  content: "";
  position: absolute;
  left: 0;
  width: 100%;
  height: 18%;
  background: #ff4d4d;
  z-index: 0;
}

#barWrap::before { top: 0; }
#barWrap::after { bottom: 0; }

/* fill */
#barFill {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: #3cc7ff;
  z-index: 1;
  transition: height 0.08s linear;
}

/* inner pixel grid overlay */
#barGrid {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(#000 1px, transparent 1px),
    linear-gradient(90deg, #000 1px, transparent 1px);
  background-size: 10px 10px;
  opacity: 0.15;
  z-index: 2;
}

/* ===== BUTTON ===== */
#waterBtn {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  font-family: inherit;
  font-size: 10px;
  padding: 14px 20px;
  background: #fff;
  border: 4px solid #000;
  box-shadow: 4px 4px 0 #000;
  cursor: pointer;
}

#waterBtn:active {
  transform: translateX(-50%) scale(0.95);
}

/* ===== GAME OVER ===== */
#gameOver {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,0.7);
  color: #fff;
}

#restart {
  margin-top: 20px;
  padding: 10px;
  font-family: inherit;
  border: 3px solid #000;
}

/* ===== ANIMATIONS ===== */
@keyframes sway {
  0% { transform: translate(-50%, -50%) rotate(-2deg); }
  50% { transform: translate(-50%, -50%) rotate(2deg); }
  100% { transform: translate(-50%, -50%) rotate(-2deg); }
}

@keyframes panic {
  0% { transform: translate(-50%, -50%) rotate(-6deg); }
  50% { transform: translate(-50%, -50%) rotate(6deg); }
  100% { transform: translate(-50%, -50%) rotate(-6deg); }
}

.normal {
  animation: sway 2.5s infinite;
}

.stressed {
  animation: panic 0.35s infinite;
}
</style>
</head>

<body>

<div id="game">

  <div id="score">Score: 0</div>

  <div id="plant">
    <div id="tree" class="normal"></div>
    <div id="pot"></div>
  </div>

  <div id="barWrap">
    <div id="barFill"></div>
    <div id="barGrid"></div>
  </div>

  <button id="waterBtn">WATER (SPACE)</button>

  <div id="gameOver">
    <h1>💀 PLANT DIED</h1>
    <div id="finalScore"></div>
    <button id="restart">RESTART</button>
  </div>

</div>

<script>
let water = 50;
let score = 0;
let alive = true;

const bar = document.getElementById("barFill");
const tree = document.getElementById("tree");
const scoreEl = document.getElementById("score");
const gameOver = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");

function update() {
  bar.style.height = water + "%";

  // danger zones (top + bottom red)
  if (water <= 18 || water >= 82) {
    tree.classList.remove("normal");
    tree.classList.add("stressed");
  } else {
    tree.classList.remove("stressed");
    tree.classList.add("normal");
  }

  if (water <= 0 || water >= 100) {
    die();
  }
}

function waterPlant() {
  if (!alive) return;
  water += 10;
  if (water > 100) water = 100;
  update();
}

function die() {
  alive = false;
  gameOver.style.display = "flex";
  finalScore.innerText = "Score: " + score;
}

document.getElementById("waterBtn").onclick = waterPlant;

document.addEventListener("keydown", e => {
  if (e.code === "Space") waterPlant();
});

document.getElementById("restart").onclick = () => location.reload();

/* main loop */
setInterval(() => {
  if (!alive) return;

  let drain = 0.6 + Math.random() * 0.8;
  water -= drain;

  score++;
  scoreEl.innerText = "Score: " + score;

  update();
}, 120);

update();
</script>

</body>
</html>

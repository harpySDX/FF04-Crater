<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Plant Care 🌱</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  margin: 0;
  background: linear-gradient(135deg, #ffd6ec, #d6f7ff);
  font-family: 'Press Start 2P', monospace;
  overflow: hidden;
  color: #333;
}

#game {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* Score */
#score {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 14px;
  background: rgba(255,255,255,0.6);
  padding: 10px;
  border-radius: 10px;
}

/* Plant */
#plant {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  image-rendering: pixelated;
  text-align: center;
}

.stem {
  width: 12px;
  height: 80px;
  background: #4caf50;
  margin: 0 auto;
  border-radius: 2px;
}

.leaf {
  width: 60px;
  height: 60px;
  background: #8aff9a;
  border-radius: 50%;
  margin: -40px auto 0 auto;
  box-shadow: 0 0 0 6px #6ee07b inset;
}

.pot {
  width: 80px;
  height: 50px;
  background: #d9a066;
  margin: 10px auto 0 auto;
  border-radius: 0 0 10px 10px;
}

/* Water bar */
#waterContainer {
  position: absolute;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 300px;
  background: rgba(255,255,255,0.5);
  border: 3px solid #444;
  border-radius: 10px;
  overflow: hidden;
}

#water {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: linear-gradient(#4dd0ff, #1e90ff);
  transition: height 0.1s linear;
}

/* Buttons */
#waterBtn {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 15px 25px;
  font-family: inherit;
  font-size: 12px;
  background: #fff;
  border: 3px solid #444;
  border-radius: 10px;
  cursor: pointer;
}

#waterBtn:active {
  transform: translateX(-50%) scale(0.95);
}

/* Game over */
#gameOver {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,0.6);
  color: white;
  text-align: center;
}

#restart {
  margin-top: 20px;
  padding: 10px 20px;
  font-family: inherit;
  border: none;
  cursor: pointer;
  background: white;
}
</style>
</head>

<body>
<div id="game">

  <div id="score">Score: 0</div>

  <div id="plant">
    <div class="leaf"></div>
    <div class="stem"></div>
    <div class="pot"></div>
  </div>

  <div id="waterContainer">
    <div id="water"></div>
  </div>

  <button id="waterBtn">WATER (SPACE)</button>

  <div id="gameOver">
    <h1>💀 Plant Died</h1>
    <div id="finalScore"></div>
    <button id="restart">Restart</button>
  </div>

</div>

<script>
let water = 50;
let score = 0;
let alive = true;

const waterEl = document.getElementById("water");
const scoreEl = document.getElementById("score");
const gameOverEl = document.getElementById("gameOver");
const finalScoreEl = document.getElementById("finalScore");

function updateWater() {
  waterEl.style.height = water + "%";

  // death conditions
  if (water <= 0 || water >= 100) {
    endGame();
  }
}

function endGame() {
  alive = false;
  gameOverEl.style.display = "flex";
  finalScoreEl.innerText = "Final Score: " + score;
}

function waterPlant() {
  if (!alive) return;
  water += 12;
  if (water > 100) water = 100;
  updateWater();
}

document.getElementById("waterBtn").onclick = waterPlant;

document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    waterPlant();
  }
});

document.getElementById("restart").onclick = () => {
  location.reload();
};

// game loop
setInterval(() => {
  if (!alive) return;

  // drain with randomness
  let drain = 1 + Math.random() * 2.5;
  water -= drain;

  // occasional fluctuation spikes
  if (Math.random() < 0.05) {
    water -= 5;
  }

  updateWater();

  score++;
  scoreEl.innerText = "Score: " + score;

}, 100);

updateWater();
</script>
</body>
</html>

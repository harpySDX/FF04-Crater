<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Plant 🌱</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  margin: 0;
  overflow: hidden;
  background: #ffdff1; /* pastel solid */
  font-family: "Press Start 2P", monospace;
  image-rendering: pixelated;
}

/* --- GAME WRAPPER --- */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* SCORE */
#score {
  position: absolute;
  top: 20px;
  left: 20px;
  font-size: 12px;
  padding: 10px;
  background: #fff;
  border: 3px solid #000;
  box-shadow: 4px 4px 0 #000;
}

/* --- TREE (PIXEL ART) --- */
#plant {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  image-rendering: pixelated;
  text-align: center;
}

/* pixel tree built from tiny squares */
.tree {
  width: 0;
  height: 0;
  margin: 0 auto;
  position: relative;
  transform-origin: bottom center;
  transition: transform 0.2s;
}

/* trunk + leaves via pixel blocks */
.tree::before {
  content: "";
  position: absolute;
  left: -10px;
  bottom: 0;
  width: 20px;
  height: 20px;
  background:
    /* leaves */
    linear-gradient(#7CFF8B, #7CFF8B) 0 0/20px 20px,
    linear-gradient(#7CFF8B, #7CFF8B) 20px 0/20px 20px,
    linear-gradient(#7CFF8B, #7CFF8B) -20px 0/20px 20px,
    linear-gradient(#7CFF8B, #7CFF8B) 0 -20px/20px 20px,

    /* trunk */
    linear-gradient(#8b5a2b, #8b5a2b) 0 20px/20px 40px;
}

/* pot */
.pot {
  width: 60px;
  height: 30px;
  margin: 10px auto 0;
  background: #d9a066;
  border: 3px solid #000;
  box-shadow: 3px 3px 0 #000;
}

/* --- WATER BAR (PIXEL SEGMENTS) --- */
#waterContainer {
  position: absolute;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  width: 60px;
  height: 320px;
  display: flex;
  flex-direction: column-reverse;
  gap: 3px;
}

.segment {
  flex: 1;
  background: #fff;
  border: 2px solid #000;
}

.segment.on {
  background: #3cc7ff;
}

/* --- BUTTON --- */
#waterBtn {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 18px;
  font-family: inherit;
  font-size: 10px;
  background: #fff;
  border: 3px solid #000;
  box-shadow: 4px 4px 0 #000;
  cursor: pointer;
}

#waterBtn:active {
  transform: translateX(-50%) scale(0.95);
}

/* --- GAME OVER --- */
#gameOver {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,0.6);
  color: white;
}

#restart {
  margin-top: 20px;
  padding: 10px;
  font-family: inherit;
  border: 2px solid #000;
  cursor: pointer;
}

/* --- TREE ANIMATIONS --- */
@keyframes sway {
  0% { transform: rotate(-2deg); }
  50% { transform: rotate(2deg); }
  100% { transform: rotate(-2deg); }
}

@keyframes panic {
  0% { transform: rotate(-6deg) scale(0.98); }
  50% { transform: rotate(6deg) scale(1.02); }
  100% { transform: rotate(-6deg) scale(0.98); }
}

.tree.normal {
  animation: sway 2.5s infinite ease-in-out;
}

.tree.stressed {
  animation: panic 0.4s infinite;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">Score: 0</div>

  <div id="plant">
    <div class="tree normal" id="tree"></div>
    <div class="pot"></div>
  </div>

  <div id="waterContainer"></div>

  <button id="waterBtn">WATER (SPACE)</button>

  <div id="gameOver">
    <h1>💀 DEAD PLANT</h1>
    <div id="finalScore"></div>
    <button id="restart">RESTART</button>
  </div>
</div>

<script>
let water = 6;
let score = 0;
let alive = true;

const waterBar = document.getElementById("waterContainer");
const scoreEl = document.getElementById("score");
const tree = document.getElementById("tree");
const gameOver = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");

/* build pixel bar */
const segments = 12;
for (let i = 0; i < segments; i++) {
  const seg = document.createElement("div");
  seg.className = "segment";
  waterBar.appendChild(seg);
}

function renderWater() {
  const segs = document.querySelectorAll(".segment");

  segs.forEach((s, i) => {
    if (i < water) s.classList.add("on");
    else s.classList.remove("on");
  });

  // tree state
  if (water <= 2 || water >= 10) {
    tree.classList.remove("normal");
    tree.classList.add("stressed");
  } else {
    tree.classList.remove("stressed");
    tree.classList.add("normal");
  }

  if (water <= 0 || water >= segments) {
    endGame();
  }
}

function waterPlant() {
  if (!alive) return;
  water += 2;
  if (water > segments) water = segments;
  renderWater();
}

document.getElementById("waterBtn").onclick = waterPlant;

document.addEventListener("keydown", (e) => {
  if (e.code === "Space") waterPlant();
});

function endGame() {
  alive = false;
  gameOver.style.display = "flex";
  finalScore.innerText = "Score: " + score;
}

document.getElementById("restart").onclick = () => location.reload();

/* game loop */
setInterval(() => {
  if (!alive) return;

  let drain = 0.4 + Math.random() * 0.6;
  water -= drain;

  score++;
  scoreEl.innerText = "Score: " + score;

  renderWater();
}, 150);

renderWater();
</script>

</body>
</html>

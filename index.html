<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Plant 🌱</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  margin: 0;
  overflow: hidden;
  background: #ffd6ec;
  font-family: "Press Start 2P", monospace;
  image-rendering: pixelated;
}

/* layout */
#game {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* score */
#score {
  position: absolute;
  top: 18px;
  left: 18px;
  font-size: 12px;
}

/* CENTER PLANT (FIXED STRUCTURE) */
#plant {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== PIXEL TREE ===== */
#tree {
  width: 140px;
  height: 140px;
  position: relative;
}

/* leaves block */
.leaves {
  width: 100px;
  height: 70px;
  background:
    #7CFF8B;
  margin: 0 auto;
  box-shadow:
    -40px 20px 0 #7CFF8B,
     40px 20px 0 #7CFF8B,
      0px 40px 0 #7CFF8B;
}

/* trunk (always centered under leaves now) */
.trunk {
  width: 18px;
  height: 60px;
  background: #8b5a2b;
  margin: -10px auto 0;
}

/* pot */
#pot {
  width: 90px;
  height: 40px;
  background: #d9a066;
  border: 3px solid #000;
  margin-top: 6px;
}

/* ===== WATER BAR ===== */
#barWrap {
  position: absolute;
  right: calc(50% - 240px);
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 300px;
  border: 4px solid #000;
  background: #fff;
}

#barWrap::before,
#barWrap::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 20%;
  left: 0;
  background: #ff4d4d;
}

#barWrap::before { top: 0; }
#barWrap::after { bottom: 0; }

#barFill {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: #3cc7ff;
}

/* button */
#waterBtn {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-family: inherit;
  font-size: 10px;
  padding: 12px 16px;
  background: #fff;
  border: 3px solid #000;
  cursor: pointer;
}

/* game over */
#gameOver {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,0.7);
  color: #fff;
}

/* animations */
@keyframes sway {
  0% { transform: rotate(-2deg); }
  50% { transform: rotate(2deg); }
  100% { transform: rotate(-2deg); }
}

@keyframes panic {
  0% { transform: rotate(-6deg); }
  50% { transform: rotate(6deg); }
  100% { transform: rotate(-6deg); }
}

.normal { animation: sway 2.5s infinite; }
.stressed { animation: panic 0.3s infinite; }

#tree.normal { transform-origin: bottom center; }
#tree.stressed { transform-origin: bottom center; }
</style>
</head>

<body>

<div id="game">
  <div id="score">Score: 0</div>

  <div id="plant">
    <div id="tree" class="normal">
      <div class="leaves"></div>
      <div class="trunk"></div>
    </div>
    <div id="pot"></div>
  </div>

  <div id="barWrap">
    <div id="barFill"></div>
  </div>

  <button id="waterBtn">WATER (SPACE)</button>

  <div id="gameOver">
    <h1>💀 DEAD</h1>
    <div id="finalScore"></div>
    <button onclick="location.reload()">RESTART</button>
  </div>
</div>

<script>
let water = 50;
let score = 0;
let alive = true;

const bar = document.getElementById("barFill");
const tree = document.getElementById("tree");
const scoreEl = document.getElementById("score");
const gameOver = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");

function update() {
  bar.style.height = water + "%";

  if (water < 20 || water > 80) {
    tree.classList.add("stressed");
    tree.classList.remove("normal");
  } else {
    tree.classList.add("normal");
    tree.classList.remove("stressed");
  }

  if (water <= 0 || water >= 100) {
    alive = false;
    gameOver.style.display = "flex";
    finalScore.innerText = "Score: " + score;
  }
}

function waterPlant() {
  if (!alive) return;
  water += 10;
  if (water > 100) water = 100;
  update();
}

document.getElementById("waterBtn").onclick = waterPlant;

document.addEventListener("keydown", e => {
  if (e.code === "Space") waterPlant();
});

setInterval(() => {
  if (!alive) return;

  water -= 0.8 + Math.random() * 0.6;
  score++;
  scoreEl.innerText = "Score: " + score;

  update();
}, 120);

update();
</script>

</body>
</html>

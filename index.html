<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pixel Plant 🌱</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

body {
  margin: 0;
  overflow: hidden;
  background: #ffd6ec;
  font-family: "Press Start 2P", monospace;
  image-rendering: pixelated;
}

#game {
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* SCORE */
#score {
  position: absolute;
  top: 18px;
  left: 18px;
  font-size: 12px;
}

/* CENTER */
#plant {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== SUCCULENT ===== */
#succulent {
  position: relative;
  width: 160px;
  height: 120px;
  margin-bottom: -10px;
}

.leaf {
  position: absolute;
  width: 70px;
  height: 70px;
  background: #6dff8f;
  border-radius: 10px;
}

.l1 { top: 10px; left: 45px; }
.l2 { top: 25px; left: 10px; transform: rotate(-35deg); background:#5ae67c; }
.l3 { top: 25px; right: 10px; transform: rotate(35deg); background:#5ae67c; }
.l4 { bottom: 10px; left: 40px; transform: rotate(180deg); background:#4fd96e; }
.l5 { top: 0px; left: 40px; background:#7cff9b; }

/* animations */
@keyframes sway {
  0% { transform: rotate(-2deg); }
  50% { transform: rotate(2deg); }
  100% { transform: rotate(-2deg); }
}

@keyframes panic {
  0% { transform: rotate(-6deg); }
  50% { transform: rotate(6deg); }
  100% { transform: rotate(-6deg); }
}

.normal { animation: sway 2.5s infinite; transform-origin: bottom center; }
.stressed { animation: panic 0.25s infinite; transform-origin: bottom center; }

/* ===== POT ===== */
#pot {
  width: 110px;
  height: 80px;
  background: linear-gradient(#e6b27a, #c98b4e);
  border: 3px solid #000;
  border-radius: 10px;
  position: relative;
  box-shadow: inset -6px -6px 0 rgba(0,0,0,0.15);
}

/* face */
.eye {
  position: absolute;
  width: 8px;
  height: 8px;
  background: #000;
  top: 28px;
  border-radius: 2px;
}

.eye.left { left: 30px; }
.eye.right { right: 30px; }

.mouth {
  position: absolute;
  width: 20px;
  height: 8px;
  border-bottom: 3px solid #000;
  border-radius: 0 0 10px 10px;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
}

/* WATER BAR */
#barWrap {
  position: absolute;
  right: calc(50% - 240px);
  top: 50%;
  transform: translateY(-50%);
  width: 50px;
  height: 300px;
  border: 4px solid #000;
  background: #fff;
}

#barFill {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: #3cc7ff;
}

/* BUTTON */
#waterBtn {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-family: inherit;
  font-size: 10px;
  padding: 12px 16px;
  background: #fff;
  border: 3px solid #000;
  cursor: pointer;
}

/* GAME OVER */
#gameOver {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  background: rgba(0,0,0,0.7);
  color: #fff;
}
</style>
</head>

<body>

<div id="game">
  <div id="score">Score: 0</div>

  <div id="plant">
    <div id="succulent" class="normal">
      <div class="leaf l1"></div>
      <div class="leaf l2"></div>
      <div class="leaf l3"></div>
      <div class="leaf l4"></div>
      <div class="leaf l5"></div>
    </div>

    <div id="pot">
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="mouth"></div>
    </div>
  </div>

  <div id="barWrap">
    <div id="barFill"></div>
  </div>

  <button id="waterBtn">WATER (SPACE)</button>

  <div id="gameOver">
    <h1>💀 DEAD</h1>
    <div id="finalScore"></div>
    <button onclick="location.reload()">RESTART</button>
  </div>
</div>

<script>
let water = 50;
let score = 0;
let alive = true;

const bar = document.getElementById("barFill");
const plant = document.getElementById("succulent");
const scoreEl = document.getElementById("score");
const gameOver = document.getElementById("gameOver");
const finalScore = document.getElementById("finalScore");

function update() {
  bar.style.height = water + "%";

  if (water < 20 || water > 80) {
    plant.classList.add("stressed");
    plant.classList.remove("normal");
  } else {
    plant.classList.add("normal");
    plant.classList.remove("stressed");
  }

  if (water <= 0 || water >= 100) {
    alive = false;
    gameOver.style.display = "flex";
    finalScore.innerText = "Score: " + score;
  }
}

function waterPlant() {
  if (!alive) return;
  water += 10;
  if (water > 100) water = 100;
  update();
}

document.getElementById("waterBtn").onclick = waterPlant;

document.addEventListener("keydown", e => {
  if (e.code === "Space") waterPlant();
});

setInterval(() => {
  if (!alive) return;

  water -= 0.8 + Math.random() * 0.6;
  score++;
  scoreEl.innerText = "Score: " + score;

  update();
}, 120);

update();
</script>

</body>
</html>
